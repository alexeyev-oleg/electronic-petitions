name: Deploy G.E.S.H.E.R. Web to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/public_web/**'
      - 'apps/admin_web/**'
      - 'shared/mock/**'
      - 'shared/content/**'
      - 'scripts/prepare-github-pages.sh'
      - 'scripts/sync-mobile-seed.sh'
      - 'scripts/sync-shared-content.sh'
      - '.github/workflows/deploy-github-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-gesher-web
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare combined site
        run: |
          chmod +x scripts/prepare-github-pages.sh
          scripts/prepare-github-pages.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/gh-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
