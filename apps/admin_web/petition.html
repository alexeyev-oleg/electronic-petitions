<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G.E.S.H.E.R. — Инициатива</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%232B2B2B'/%3E%3Ctext x='18' y='42' fill='white' font-size='28' font-family='Arial' font-weight='700'%3EG%3C/text%3E%3Ccircle cx='44' cy='42' r='5' fill='%23C6643C'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="css/layout.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div>
          <div class="logo logo--inverse" id="sidebar-logo" aria-label="G.E.S.H.E.R."></div>
          <p style="margin:8px 0 0;font-size:0.8rem;opacity:0.75;">Staff Portal · MOCK</p>
        </div>
        <nav class="sidebar__nav">
          <a class="sidebar__link" id="back-dashboard" href="#">← К рабочему месту</a>
        </nav>
        <button class="btn btn--secondary" id="sign-out-btn" type="button">Выйти</button>
      </aside>

      <div class="main">
        <header class="topbar">
          <div>
            <h1 class="page-title" id="petition-title">Инициатива</h1>
            <p id="petition-subtitle" style="margin:4px 0 0;color:var(--color-text-muted);"></p>
          </div>
          <div class="topbar__meta">
            <button class="btn btn--secondary no-print" id="print-btn" type="button">Печать</button>
            <span class="chip" id="role-chip"></span>
            <strong id="user-name"></strong>
          </div>
        </header>

        <div class="content content--printable">
          <p class="print-only">G.E.S.H.E.R. Staff Portal · mock beta · печать карточки инициативы</p>
          <section class="card print-area" style="padding:var(--space-lg);" id="petition-detail"></section>
          <section class="card no-print" style="padding:var(--space-lg);" id="petition-actions"></section>
          <p id="action-message" style="min-height:1.25rem;color:var(--color-success);font-weight:600;"></p>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/mock-store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/otp-sheet.js"></script>
    <script src="js/petitions.js"></script>
    <script src="js/petition-detail.js"></script>
  </body>
</html>
