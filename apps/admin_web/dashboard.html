<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G.E.S.H.E.R. — Staff Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%232B2B2B'/%3E%3Ctext x='18' y='42' fill='white' font-size='28' font-family='Arial' font-weight='700'%3EG%3C/text%3E%3Ccircle cx='44' cy='42' r='5' fill='%23C6643C'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="css/layout.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div>
          <div class="logo logo--inverse" id="sidebar-logo" aria-label="G.E.S.H.E.R."></div>
          <p style="margin:8px 0 0;font-size:0.8rem;opacity:0.75;">Staff Portal · MOCK</p>
        </div>

        <nav class="sidebar__nav" id="sidebar-nav" aria-label="Модули"></nav>

        <button class="btn btn--secondary" id="sign-out-btn" type="button">Выйти</button>
      </aside>

      <div class="main">
        <header class="topbar">
          <div>
            <h1 class="page-title" id="page-title">Рабочее место</h1>
            <p id="page-subtitle" style="margin:4px 0 0;color:var(--color-text-muted);"></p>
          </div>
          <div class="topbar__meta">
            <span class="chip" id="role-chip"></span>
            <strong id="user-name"></strong>
          </div>
        </header>

        <div class="content">
          <section class="banner" id="role-banner"></section>

          <div class="grid-2">
            <section class="card" style="padding:var(--space-lg);">
              <h2 style="margin-top:0;">Очередь по роли</h2>
              <div class="filter-row" id="module-filters" style="display:none;"></div>
              <div id="module-table"></div>
            </section>

            <section class="card" style="padding:var(--space-lg);">
              <h2 style="margin-top:0;">Влияние вместе</h2>
              <div id="stats-panel"></div>
            </section>
          </div>

          <section class="card banner--muted" style="padding:var(--space-lg);">
            <h2 style="margin-top:0;">Mock demo</h2>
            <p style="margin:0;color:var(--color-text-muted);">
              Данные загружаются из <code>mock/seed.json</code> (W3 shared mock).
              OTP для защищённых действий: <strong>123456</strong>.
            </p>
          </section>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/mock-store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/petitions.js"></script>
    <script src="js/complaints.js"></script>
    <script src="js/enforcement.js"></script>
    <script src="js/otp-sheet.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
