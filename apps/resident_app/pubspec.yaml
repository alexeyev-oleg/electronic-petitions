name: resident_app
description: Resident mobile app for petitions, complaints, and municipal enforcement.
publish_to: none

version: 0.2.0+4

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.9.0
  intl: ^0.20.2
  flutter_secure_storage: ^9.2.4
  geolocator: ^13.0.2
  image_picker: ^1.1.2
  file_picker: ^10.3.3
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  build_runner: ^2.6.0
  freezed: ^3.2.0
  freezed_annotation: ^3.1.0
  json_serializable: ^6.11.1
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/l10n/
    - assets/brand/
    - assets/mock/seed.json
    - assets/mock/media/
    - assets/content/faq.json

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/brand/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/brand/app_icon.png
